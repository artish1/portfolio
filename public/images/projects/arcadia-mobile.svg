<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" fill="#0A0A0A"/>
  <!-- Phone frame -->
  <rect x="440" y="40" width="400" height="720" rx="32" fill="#111111" stroke="#222" stroke-width="2"/>
  <rect x="460" y="60" width="60" height="8" rx="4" fill="#333"/>
  <rect x="760" y="60" width="40" height="8" rx="4" fill="#333"/>
  <!-- Mobile nav -->
  <rect x="460" y="85" width="100" height="14" rx="4" fill="#f5d7b1"/>
  <rect x="790" y="87" width="24" height="10" rx="3" fill="#333"/>
  <!-- Product image -->
  <rect x="460" y="115" width="360" height="280" rx="8" fill="#0A0A0A"/>
  <ellipse cx="640" cy="250" rx="120" ry="90" fill="#1a1a1a"/>
  <ellipse cx="640" cy="240" rx="80" ry="60" fill="#ceab8e" opacity="0.25"/>
  <ellipse cx="635" cy="235" rx="45" ry="35" fill="#f5d7b1" opacity="0.3"/>
  <!-- Dots indicator -->
  <circle cx="610" cy="385" r="4" fill="#f5d7b1"/>
  <circle cx="630" cy="385" r="4" fill="#333"/>
  <circle cx="650" cy="385" r="4" fill="#333"/>
  <circle cx="670" cy="385" r="4" fill="#333"/>
  <!-- Product info -->
  <rect x="460" y="410" width="200" height="18" rx="4" fill="#333"/>
  <rect x="460" y="440" width="100" height="16" rx="4" fill="#f5d7b1" opacity="0.6"/>
  <rect x="460" y="475" width="360" height="8" rx="3" fill="#1a1a1a"/>
  <rect x="460" y="495" width="300" height="8" rx="3" fill="#1a1a1a"/>
  <!-- Color swatches -->
  <circle cx="475" cy="535" r="12" fill="#ceab8e" stroke="#f5d7b1" stroke-width="2"/>
  <circle cx="510" cy="535" r="12" fill="#4d6071"/>
  <circle cx="545" cy="535" r="12" fill="#6B8F71"/>
  <!-- Add to cart button -->
  <rect x="460" y="570" width="360" height="48" rx="24" fill="#f5d7b1"/>
  <!-- Related products -->
  <rect x="460" y="640" width="110" height="90" rx="6" fill="#0A0A0A"/>
  <rect x="585" y="640" width="110" height="90" rx="6" fill="#0A0A0A"/>
  <rect x="710" y="640" width="110" height="90" rx="6" fill="#0A0A0A"/>
</svg>
