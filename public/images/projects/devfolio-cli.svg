<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" rx="8" fill="#0A0A0A"/>
  <rect width="1280" height="40" rx="8" fill="#1A1A1A"/>
  <circle cx="24" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="64" cy="20" r="6" fill="#28CA41"/>
  <rect x="200" y="12" width="200" height="16" rx="8" fill="#0A0A0A"/>

  <!-- Terminal content -->
  <rect x="60" y="80" width="14" height="14" rx="2" fill="#6B8F71"/>
  <rect x="85" y="82" width="200" height="10" rx="3" fill="#6B8F71" opacity="0.7"/>

  <rect x="85" y="115" width="400" height="10" rx="3" fill="#444"/>
  <rect x="85" y="140" width="350" height="10" rx="3" fill="#444"/>

  <!-- ASCII art / logo area -->
  <rect x="85" y="185" width="500" height="8" rx="2" fill="#f5d7b1" opacity="0.5"/>
  <rect x="85" y="200" width="520" height="8" rx="2" fill="#f5d7b1" opacity="0.5"/>
  <rect x="85" y="215" width="480" height="8" rx="2" fill="#f5d7b1" opacity="0.5"/>
  <rect x="85" y="230" width="510" height="8" rx="2" fill="#f5d7b1" opacity="0.5"/>

  <!-- Interactive prompts -->
  <rect x="60" y="280" width="14" height="14" rx="2" fill="#ceab8e"/>
  <rect x="85" y="282" width="300" height="10" rx="3" fill="#ceab8e" opacity="0.6"/>

  <!-- Options list -->
  <rect x="100" y="315" width="14" height="14" rx="7" fill="#6B8F71"/>
  <rect x="125" y="317" width="200" height="10" rx="3" fill="#ddd"/>
  <rect x="100" y="345" width="14" height="14" rx="7" fill="none" stroke="#444" stroke-width="2"/>
  <rect x="125" y="347" width="180" height="10" rx="3" fill="#666"/>
  <rect x="100" y="375" width="14" height="14" rx="7" fill="none" stroke="#444" stroke-width="2"/>
  <rect x="125" y="377" width="220" height="10" rx="3" fill="#666"/>
  <rect x="100" y="405" width="14" height="14" rx="7" fill="none" stroke="#444" stroke-width="2"/>
  <rect x="125" y="407" width="160" height="10" rx="3" fill="#666"/>

  <!-- Spinner / progress -->
  <rect x="60" y="460" width="14" height="14" rx="2" fill="#4d6071"/>
  <rect x="85" y="462" width="250" height="10" rx="3" fill="#4d6071" opacity="0.6"/>

  <!-- Progress bar -->
  <rect x="85" y="495" width="500" height="12" rx="6" fill="#1a1a1a"/>
  <rect x="85" y="495" width="350" height="12" rx="6" fill="#6B8F71" opacity="0.6"/>

  <!-- Output lines -->
  <rect x="85" y="530" width="300" height="8" rx="3" fill="#6B8F71" opacity="0.4"/>
  <rect x="85" y="550" width="280" height="8" rx="3" fill="#6B8F71" opacity="0.4"/>
  <rect x="85" y="570" width="320" height="8" rx="3" fill="#6B8F71" opacity="0.4"/>

  <!-- Success message -->
  <rect x="60" y="610" width="14" height="14" rx="2" fill="#6B8F71"/>
  <rect x="85" y="612" width="400" height="10" rx="3" fill="#6B8F71" opacity="0.8"/>

  <!-- Final prompt -->
  <rect x="60" y="660" width="14" height="14" rx="2" fill="#f5d7b1"/>
  <rect x="85" y="662" width="100" height="10" rx="3" fill="#f5d7b1" opacity="0.6"/>
  <rect x="195" y="660" width="2" height="14" fill="#f5d7b1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
