  <rect x="60" y="365" width="280" height="6" rx="3" fill="#4d6071" opacity="0.4"/>
  <rect x="60" y="380" width="240" height="6" rx="3" fill="#4d6071" opacity="0.4"/>
  <rect x="60" y="395" width="160" height="6" rx="3" fill="#6B8F71" opacity="0.4"/>
  <!-- Right editor - User B -->
  <circle cx="670" cy="70" r="12" fill="#f5d7b1"/>
  <rect x="690" y="64" width="80" height="10" rx="3" fill="#f5d7b1" opacity="0.6"/>
