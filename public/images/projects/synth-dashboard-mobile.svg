  <rect x="460" y="90" width="140" height="16" rx="4" fill="#f5d7b1" opacity="0.7"/>
  <rect x="780" y="92" width="30" height="12" rx="3" fill="#333"/>
  <!-- Chart card -->
  <rect x="460" y="130" width="360" height="200" rx="8" fill="#0A0A0A"/>
  <polyline points="480,300 520,270 560,285 600,240 640,260 680,210 720,230 760,190 800,220" stroke="#f5d7b1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="480" y1="220" x2="800" y2="220" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="480" y1="270" x2="800" y2="270" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Stats row -->
  <rect x="460" y="345" width="170" height="80" rx="8" fill="#0A0A0A"/>
  <rect x="475" y="365" width="60" height="8" rx="3" fill="#333"/>
  <rect x="475" y="385" width="80" height="16" rx="4" fill="#6B8F71" opacity="0.7"/>
  <rect x="650" y="345" width="170" height="80" rx="8" fill="#0A0A0A"/>
  <rect x="665" y="365" width="60" height="8" rx="3" fill="#333"/>
  <rect x="665" y="385" width="80" height="16" rx="4" fill="#4d6071" opacity="0.7"/>
  <!-- List items -->
  <rect x="460" y="445" width="360" height="50" rx="8" fill="#0A0A0A"/>
  <rect x="480" y="460" width="120" height="8" rx="3" fill="#444"/>
  <rect x="480" y="475" width="80" height="6" rx="3" fill="#333"/>
  <rect x="460" y="505" width="360" height="50" rx="8" fill="#0A0A0A"/>
  <rect x="480" y="520" width="100" height="8" rx="3" fill="#444"/>
  <rect x="480" y="535" width="90" height="6" rx="3" fill="#333"/>
  <rect x="460" y="565" width="360" height="50" rx="8" fill="#0A0A0A"/>
  <rect x="480" y="580" width="140" height="8" rx="3" fill="#444"/>
  <rect x="480" y="595" width="70" height="6" rx="3" fill="#333"/>
  <!-- Bottom nav -->
  <rect x="460" y="680" width="360" height="50" rx="0" fill="#0A0A0A"/>
  <rect x="510" y="695" width="30" height="20" rx="4" fill="#333"/>
  <rect x="610" y="695" width="30" height="20" rx="4" fill="#f5d7b1" opacity="0.5"/>
  <rect x="710" y="695" width="30" height="20" rx="4" fill="#333"/>
